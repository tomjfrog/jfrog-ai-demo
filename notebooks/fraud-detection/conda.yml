# Fraud detection notebook environment
# Create: conda env create -f conda.yml
# Activate: conda activate fraud-detection
# Channels come from .condarc only (Artifactory); no channel names here to avoid channel_alias resolution
name: fraud-detection
dependencies:
  - python=3.11
  - pandas>=1.5
  - scikit-learn>=1.3
  - numpy>=1.24,<2
  - scipy>=1.11
  - catboost
  - xgboost
  - matplotlib
  - seaborn
  - jupyter
  - ipykernel
  - pip
  - pip:
    - frogml>=2.0.0
