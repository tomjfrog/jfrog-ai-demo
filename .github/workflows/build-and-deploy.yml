# Basic Demo - Build, Scan, and Deploy to Artifactory
#
# Deploys sentiment classifier from basic-demo/:
#   1. Docker image -> Artifactory Docker registry (security & license scanned by Xray)
#   2. Python application zip -> Artifactory generic repository
#
# JFrog CLI integration per: https://github.com/jfrog/setup-jfrog-cli
#
# Required variables: JF_URL, JF_PROJECT, DOCKER_REGISTRY, DOCKER_REPOSITORY, DOCKER_BASE_IMAGE
#   - OIDC authentication (no JF_ACCESS_TOKEN secret needed when OIDC is configured)

name: Basic Demo - Build and Deploy to Artifactory

on:
  push:
    branches: [main, master]
    paths:
      - 'basic-demo/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'basic-demo/**'
  workflow_dispatch:

env:
  IMAGE_NAME: jfrog-ai-demo
  APP_NAME: jfrog-ai-demo
  BASIC_DEMO_DIR: basic-demo
  DOCKER_REPOSITORY: ${{ vars.ARTIFACTORY_DOCKER_REPO || 'docker-local' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup JF CLI
        id: jfrog-cli
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT }}
        with:
          oidc-provider-name: 'github-oidc-integration'
          oidc-audience: 'jfrog-github'

      - name: Configure pip for Artifactory (OIDC)
        env:
          JF_USER: ${{ steps.jfrog-cli.outputs.oidc-user }}
          JF_TOKEN: ${{ steps.jfrog-cli.outputs.oidc-token }}
        run: |
          ENCODED_USER=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('JF_USER', ''), safe=''))")
          ENCODED_TOKEN=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('JF_TOKEN', ''), safe=''))")
          echo "PIP_INDEX_URL=https://${ENCODED_USER}:${ENCODED_TOKEN}@${{ vars.DOCKER_REGISTRY }}/artifactory/api/pypi/${{ vars.JF_PYPI_REPO || 'pypi-virtual' }}/simple/" >> $GITHUB_ENV
          echo "PIP_TRUSTED_HOST=${{ vars.DOCKER_REGISTRY }}" >> $GITHUB_ENV

      - name: Download wheels (once, from Artifactory)
        run: |
          mkdir -p ${BASIC_DEMO_DIR}/wheels
          pip download -r ${BASIC_DEMO_DIR}/requirements.txt -d ${BASIC_DEMO_DIR}/wheels
          pip download pytest -d ${BASIC_DEMO_DIR}/wheels

      - name: Run tests
        run: |
          pip install --no-index -f ${BASIC_DEMO_DIR}/wheels -r ${BASIC_DEMO_DIR}/requirements.txt
          pip install --no-index -f ${BASIC_DEMO_DIR}/wheels pytest
          cd ${BASIC_DEMO_DIR} && PYTHONPATH=. pytest tests/ -v --tb=short

      - name: Set version
        id: version
        run: |
          VERSION=${GITHUB_SHA::7}
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; }; then
            VERSION="${VERSION}-$(date +%Y%m%d%H%M)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Set build info for JFrog CLI
        run: |
          echo "JFROG_CLI_BUILD_NAME=${{ env.APP_NAME }}" >> $GITHUB_ENV
          echo "JFROG_CLI_BUILD_NUMBER=${{ steps.version.outputs.version }}" >> $GITHUB_ENV

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ steps.jfrog-cli.outputs.oidc-user }}
          password: ${{ steps.jfrog-cli.outputs.oidc-token }}

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BASIC_DEMO_DIR }}
          file: ${{ env.BASIC_DEMO_DIR }}/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          build-args: |
            DOCKER_BASE_IMAGE=${{ format('{0}/{1}/{2}', vars.DOCKER_REGISTRY, vars.DOCKER_REPOSITORY, vars.DOCKER_BASE_IMAGE) }}
          tags: |
            ${{ vars.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
            ${{ vars.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Scan Docker image with Xray
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          jf docker scan "${{ vars.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}" --format=json || true
          # Note: Xray scan may fail if Xray is not configured. Use '|| true' for demo.
          # Remove '|| true' in production to fail the pipeline on critical vulnerabilities.

      - name: Create and push Python app archive (app + wheels)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          cd ${BASIC_DEMO_DIR}
          zip -r "${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip" main/ app.py requirements.txt wheels/ -x "*.pyc" -x "__pycache__/*"
          GENERIC_REPO="${{ vars.ARTIFACTORY_GENERIC_REPO || 'generic-local' }}"
          jf rt u "${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip" "${GENERIC_REPO}/${{ env.APP_NAME }}/${{ steps.version.outputs.version }}/"
          cd ..

      # Build info is auto-published by setup-jfrog-cli at workflow end; Xray scans when published
