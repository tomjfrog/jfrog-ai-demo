# Comprehensive Demo - Build and Deploy Act 3 to Artifactory
#
# Deploys the governed churn prediction container (Act 3) to Artifactory.
# Act 1 (rogue) is included for comparison but NOT deployed.
#
# JFrog CLI integration per: https://github.com/jfrog/setup-jfrog-cli
#
# Required variables: JF_URL, JF_PROJECT, JF_DOCKER_REGISTRY
#   - OIDC authentication (no JF_ACCESS_TOKEN secret needed when OIDC is configured)

name: Comprehensive Demo - Build and Deploy Churn Prediction

on:
  push:
    branches: [main, master]
    paths:
      - 'comprehensive-demo/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'comprehensive-demo/**'
  workflow_dispatch:

env:
  IMAGE_NAME: churn-prediction
  ACT3_PATH: comprehensive-demo/act3
  DOCKER_REPOSITORY: ${{ vars.ARTIFACTORY_DOCKER_REPO || 'docker-local' }}

jobs:
  build-act3:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JF CLI
        id: jfrog-cli
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT }}
        with:
          oidc-provider-name: 'github-oidc-integration'
          oidc-audience: 'jfrog-github'

      - name: Set version
        id: version
        run: |
          VERSION=${GITHUB_SHA::7}
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; }; then
            VERSION="${VERSION}-$(date +%Y%m%d%H%M)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Set build info for JFrog CLI
        run: |
          echo "JFROG_CLI_BUILD_NAME=${{ env.IMAGE_NAME }}" >> $GITHUB_ENV
          echo "JFROG_CLI_BUILD_NUMBER=${{ steps.version.outputs.version }}" >> $GITHUB_ENV

      - name: Docker Login
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.JF_DOCKER_REGISTRY }}
          username: ${{ steps.jfrog-cli.outputs.oidc-user }}
          password: ${{ steps.jfrog-cli.outputs.oidc-token }}

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.ACT3_PATH }}
          file: ${{ env.ACT3_PATH }}/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: |
            ${{ vars.JF_DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
            ${{ vars.JF_DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Scan Docker image with Xray
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          jf docker scan "${{ vars.JF_DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}" --format=json || true

      # Build info is auto-published by setup-jfrog-cli at workflow end; Xray scans when published
